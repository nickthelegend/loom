name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      # Whichever terminal backend this runner ends up with (node-pty ships no
      # Linux prebuild, so CI usually builds it or goes without).
      - run: npm test
        env:
          LOOM_NO_NOTIFY: "1"
      # And again with the pty forced off. The pipe fallback is what a machine
      # without a toolchain runs, so it can't be allowed to rot untested.
      - run: npm test
        env:
          LOOM_NO_NOTIFY: "1"
          LOOM_NO_PTY: "1"
